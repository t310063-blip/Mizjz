<script>
    /**
     * 雙向滾動動畫邏輯 (EZpage 專用強化版)
     * 確保往上滑、往下滑都有動畫感
     */
    function reveal() {
        var reveals = document.querySelectorAll(".ez-section");
        for (var i = 0; i < reveals.length; i++) {
            var windowHeight = window.innerHeight;
            var elementTop = reveals[i].getBoundingClientRect().top;
            var elementVisible = 100; // 觸發距離

            if (elementTop < windowHeight - elementVisible && elementTop > -reveals[i].offsetHeight) {
                reveals[i].classList.add("active");
            } else {
                // 往上滑走時移除類別，創造重複動畫感
                reveals[i].classList.remove("active");
            }
        }
    }

    window.addEventListener("scroll", reveal);
    // 初始執行一次，確保首屏內容顯示
    reveal();
</script>
